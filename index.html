<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0a1e3c">
    <meta name="description" content="SISPE - Sistema de Preparación para el Empleo. Plataforma integral para la superación profesional de recién graduados universitarios.">
    
    <title>SISPE - Sistema de Preparación para el Empleo</title>
    
    <!-- ============================================================ -->
    <!-- RECURSOS EXTERNOS -->
    <!-- ============================================================ -->
    <!-- Font Awesome 6 (iconos profesionales) -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <!-- Google Fonts (tipografía moderna) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <!-- ============================================================ -->
    <!-- ESTILOS DE LA APLICACIÓN -->
    <!-- ============================================================ -->
    <link rel="stylesheet" href="css/style.css">
    
    <!-- ============================================================ -->
    <!-- MANIFEST PARA PWA -->
    <!-- ============================================================ -->
    <link rel="manifest" href="manifest.json">
    
    <!-- ============================================================ -->
    <!-- FAVICON -->
    <!-- ============================================================ -->
    <link rel="icon" type="image/png" href="icon-192.png">
</head>
<body>

    <!-- ============================================================ -->
    <!-- CONTENEDOR PRINCIPAL DE LA APLICACIÓN -->
    <!-- ============================================================ -->
    <div id="app">
        <!-- El contenido se carga dinámicamente según el estado de autenticación -->
    </div>

    <!-- ============================================================ -->
    <!-- SCRIPTS DE LA APLICACIÓN -->
    <!-- ============================================================ -->
    
	<!-- 1. LIBRERÍA SQLITE (base de datos local) - Usando la versión correcta -->
	<script src="https://cdnjs.cloudflare.com/ajax/libs/sql.js/1.10.3/sql-wasm.js"></script>
    
    <!-- 2. LIBRERÍA PARA GENERAR PDFs -->
    <script src="lib/jspdf.umd.min.js"></script>
    
    <!-- 3. LIBRERÍA PARA EXCEL (SheetJS) -->
    <script src="lib/xlsx.full.min.js"></script>
    
    <!-- 4. LIBRERÍA EMAILJS (notificaciones por correo) -->
    <script src="lib/email.min.js"></script>
    
    <!-- ============================================================ -->
    <!-- MÓDULOS DE LA APLICACIÓN (orden de carga importante) -->
    <!-- ============================================================ -->
    
    <!-- 5.1 Configuración global y constantes -->
    <script src="js/config.js"></script>
    
    <!-- 5.2 Capa de base de datos (SQLite) -->
    <script src="js/modules/db.js"></script>
    
    <!-- 5.3 Autenticación y gestión de sesión -->
    <script src="js/modules/auth.js"></script>
    
    <!-- 5.4 Módulo de ayuda y documentación -->
    <script src="js/modules/help.js"></script>
    
    <!-- 5.5 Módulo de notificaciones -->
    <script src="js/modules/notifications.js"></script>
    
    <!-- 5.6 Módulo de sincronización (offline/online) -->
    <script src="js/modules/sync.js"></script>
    
    <!-- 5.7 Módulo de reportes -->
    <script src="js/modules/reports.js"></script>
    
    <!-- 5.8 Módulo de administración -->
    <script src="js/modules/admin.js"></script>
    
    <!-- 5.9 Módulo del egresado -->
    <script src="js/modules/roles/egresado.js"></script>
    
    <!-- 5.10 Módulo del tutor -->
    <script src="js/modules/roles/tutor.js"></script>
    
    <!-- 5.11 Módulo del coordinador -->
    <script src="js/modules/roles/coordinador.js"></script>
    
    <!-- 5.12 Módulo del directivo -->
    <script src="js/modules/roles/directivo.js"></script>
    
    <!-- 5.13 Controlador principal de la aplicación -->
    <script src="js/app.js"></script>

</body>
</html>
